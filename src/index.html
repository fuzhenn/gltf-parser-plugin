<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Component Positioning - gltf-parser-plugin</title>
    <style>
      #info {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px 15px;
        border-radius: 4px;
        font-size: 14px;
        z-index: 100;
      }
      #loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 20px;
        border-radius: 8px;
        z-index: 9999;
        font-size: 16px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <div id="info">点击构件进行定位</div>
    <div id="loading">模型加载中...</div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@latest/build/three.module.js",
          "three/examples/": "https://cdn.jsdelivr.net/npm/three@latest/examples/",
          "3d-tiles-renderer": "https://cdn.jsdelivr.net/npm/3d-tiles-renderer@0.4.21/build/index.js",
          "gltf-parser-plugin": "https://cdn.jsdelivr.net/npm/gltf-parser-plugin@1.0.9/build/gltf-parser-plugin.module.js"
        }
      }
    </script>

    <script type="module">
      import { TilesRenderer, EnvironmentControls } from "3d-tiles-renderer";
      import { GLTFParserPlugin } from "gltf-parser-plugin";
      import {
        Scene,
        DirectionalLight,
        AmbientLight,
        WebGLRenderer,
        PerspectiveCamera,
        Raycaster,
        Vector2,
        Vector3,
        Box3,
        Box3Helper,
        Color,
      } from "three";

      const baseUrl = "http://localhost:5173/docs/school";

      function initScene(container) {
        const scene = new Scene();
        scene.background = new Color(0xf5f5f5);

        const renderer = new WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const camera = new PerspectiveCamera(
          50,
          window.innerWidth / window.innerHeight,
          0.1,
          10000,
        );
        camera.position.set(80, 60, 80);
        camera.lookAt(0, 0, 0);

        const controls = new EnvironmentControls(
          scene,
          camera,
          renderer.domElement,
        );
        controls.enableDamping = true;

        const ambientLight = new AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(50, 100, 50);
        scene.add(directionalLight);

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });

        return { scene, camera, renderer, controls };
      }

      function setupPositioning(
        tilesRenderer,
        gltfPlugin,
        scene,
        camera,
        controls,
      ) {
        const raycaster = new Raycaster();
        const mouse = new Vector2();
        let boxHelper = null;

        function flyToComponent(boundingBox) {
          const center = boundingBox.getCenter(new Vector3());
          const size = boundingBox.getSize(new Vector3());
          const maxDim = Math.max(size.x, size.y, size.z);
          const distance = maxDim * 2;

          const offset = new Vector3(
            distance * 0.8,
            distance * 0.6,
            distance * 0.8,
          );
          const targetPosition = center.clone().add(offset);

          const startPos = camera.position.clone();
          const startTime = performance.now();
          const duration = 1000;

          function animate(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const easeProgress = 1 - Math.pow(1 - progress, 3);

            camera.position.lerpVectors(startPos, targetPosition, easeProgress);
            camera.lookAt(center);

            if (progress < 1) {
              requestAnimationFrame(animate);
            }
          }

          requestAnimationFrame(animate);
        }

        function showBoundingBox(boundingBox) {
          if (boxHelper) {
            scene.remove(boxHelper);
          }
          boxHelper = new Box3Helper(boundingBox, 0x00aaff);
          scene.add(boxHelper);
        }

        window.addEventListener("click", (event) => {
          mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
          mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

          raycaster.setFromCamera(mouse, camera);
          const intersects = raycaster.intersectObject(
            tilesRenderer.group,
            true,
          );

          if (intersects.length > 0) {
            const featureInfo = gltfPlugin.queryFeatureFromIntersection(
              intersects[0],
            );

            if (featureInfo.isValid && featureInfo.oid !== undefined) {
              gltfPlugin.getNodeTreeByOid(featureInfo.oid).then((node) => {
                if (node && node.bbox) {
                  const boundingBox = new Box3(
                    new Vector3(node.bbox[0], node.bbox[1], node.bbox[2]),
                    new Vector3(node.bbox[3], node.bbox[4], node.bbox[5]),
                  );
                  showBoundingBox(boundingBox);
                  flyToComponent(boundingBox);
                  console.log("构件信息:", node);
                }
              });
            }
          }
        });
      }

      async function main() {
        const container = document.getElementById("container");
        const loadingElement = document.getElementById("loading");

        const { scene, camera, renderer, controls } = initScene(container);

        loadingElement.style.display = "block";

        const tilesRenderer = new TilesRenderer(`${baseUrl}/tileset.json`);
        tilesRenderer.setCamera(camera);
        tilesRenderer.group.rotation.x = -Math.PI / 2;

        const gltfPlugin = new GLTFParserPlugin({
          renderer,
          metadata: true,
        });
        tilesRenderer.registerPlugin(gltfPlugin);
        scene.add(tilesRenderer.group);

        tilesRenderer.addEventListener("tiles-load-start", () => {
          loadingElement.style.display = "block";
        });

        tilesRenderer.addEventListener("tiles-load-end", () => {
          loadingElement.style.display = "none";
        });

        setupPositioning(
          tilesRenderer,
          gltfPlugin,
          scene,
          camera,
          controls,
        );

        function animate() {
          requestAnimationFrame(animate);
          controls.update();
          camera.updateMatrixWorld();
          tilesRenderer.update();
          renderer.render(scene, camera);
        }

        animate();
      }

      main();
    </script>
  </body>
</html>
