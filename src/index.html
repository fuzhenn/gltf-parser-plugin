<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Emphasis Component - gltf-parser-plugin</title>
    <link rel="stylesheet" href="./index.css" />
    <style>
      #info {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px 15px;
        border-radius: 4px;
        font-size: 14px;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <div id="info">点击构件使其闪烁强调</div>
    
    <script type="module">
      import { TilesRenderer, EnvironmentControls } from "3d-tiles-renderer";
      import { GLTFParserPlugin } from "gltf-parser-plugin";
      import {
        Scene,
        DirectionalLight,
        AmbientLight,
        WebGLRenderer,
        PerspectiveCamera,
        Raycaster,
        Vector2,
        Color,
      } from "three";

      const baseUrl = "http://localhost:5173/docs/school";

      function initScene(container) {
        const scene = new Scene();
        scene.background = new Color(0xf5f5f5);

        const renderer = new WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const camera = new PerspectiveCamera(
          50,
          window.innerWidth / window.innerHeight,
          0.1,
          10000,
        );
        camera.position.set(80, 60, 80);
        camera.lookAt(0, 0, 0);

        const controls = new EnvironmentControls(
          scene,
          camera,
          renderer.domElement,
        );
        controls.enableDamping = true;

        const ambientLight = new AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(50, 100, 50);
        scene.add(directionalLight);

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });

        return { scene, camera, renderer, controls };
      }

      // ============================================
      // gltf-parser-plugin 核心功能演示 - 构件强调（闪烁效果）
      // 使用插件封装的 setBlinkPartsByOids、clearAllBlinkParts 等接口
      // ============================================
      function setupEmphasis(tilesRenderer, gltfPlugin, camera) {
        const raycaster = new Raycaster();
        const mouse = new Vector2();

        window.addEventListener("click", (event) => {
          mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
          mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

          raycaster.setFromCamera(mouse, camera);
          const intersects = raycaster.intersectObject(
            tilesRenderer.group,
            true,
          );

          if (intersects.length > 0) {
            const featureInfo = gltfPlugin.queryFeatureFromIntersection(
              intersects[0],
            );
            if (featureInfo.isValid && featureInfo.oid !== undefined) {
              gltfPlugin.setBlinkPartsByOids([featureInfo.oid]);
            } else {
              gltfPlugin.clearAllBlinkParts();
            }
          } else {
            gltfPlugin.clearAllBlinkParts();
          }
        });
      }

      async function main() {
        const container = document.getElementById("container");

        const { scene, camera, renderer, controls } = initScene(container);

        const tilesRenderer = new TilesRenderer(`${baseUrl}/tileset.json`);
        tilesRenderer.setCamera(camera);
        tilesRenderer.group.rotation.x = -Math.PI / 2;

        const gltfPlugin = new GLTFParserPlugin({
          renderer,
          metadata: true,
        });
        tilesRenderer.registerPlugin(gltfPlugin);
        scene.add(tilesRenderer.group);

        setupEmphasis(tilesRenderer, gltfPlugin, camera);

        function animate() {
          requestAnimationFrame(animate);
          controls.update();
          camera.updateMatrixWorld();
          tilesRenderer.update();
          renderer.render(scene, camera);
        }

        animate();
      }

      main();
    </script>
  </body>
</html>
