<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Custom Wireframe - gltf-parser-plugin</title>
    <link rel="stylesheet" href="./index.css" />
    <style>
      #info {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px 15px;
        border-radius: 4px;
        font-size: 14px;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <div id="info">点击构件以线框模式显示</div>

    

    <script type="module">
      import { TilesRenderer, EnvironmentControls } from "3d-tiles-renderer";
      import { GLTFParserPlugin } from "gltf-parser-plugin";
      import {
        Scene,
        DirectionalLight,
        AmbientLight,
        WebGLRenderer,
        PerspectiveCamera,
        Raycaster,
        Vector2,
        Color,
        MeshBasicMaterial,
        LineSegments,
        EdgesGeometry,
      } from "three";

      const baseUrl = "http://localhost:5173/docs/school";

      function initScene(container) {
        const scene = new Scene();
        scene.background = new Color(0xf5f5f5);

        const renderer = new WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const camera = new PerspectiveCamera(
          50,
          window.innerWidth / window.innerHeight,
          0.1,
          10000,
        );
        camera.position.set(80, 60, 80);
        camera.lookAt(0, 0, 0);

        const controls = new EnvironmentControls(
          scene,
          camera,
          renderer.domElement,
        );
        controls.enableDamping = true;

        const ambientLight = new AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(50, 100, 50);
        scene.add(directionalLight);

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });

        return { scene, camera, renderer, controls };
      }

      // ============================================
      // gltf-parser-plugin 核心功能演示 - 自定义线框显示
      // 点击获取构件后，用线框模式渲染该构件
      // ============================================
      function setupWireframe(tilesRenderer, gltfPlugin, scene, camera) {
        const raycaster = new Raycaster();
        const mouse = new Vector2();

        // 当前线框状态
        let currentOid = null;
        let currentCollector = null;
        let wireframeMeshes = [];

        // 填充材质（半透明青色）
        const fillMaterial = new MeshBasicMaterial({
          color: 0x00d4aa,
          transparent: true,
          opacity: 0.3,
          side: 2,
          depthWrite: false,
        });

        // 边框材质
        const edgeMaterial = new MeshBasicMaterial({
          color: 0x00d4aa,
          transparent: true,
          opacity: 0.8,
        });

        // 清除线框
        function clearWireframe() {
          if (currentOid === null) return;

          // 恢复原始材质
          wireframeMeshes.forEach((mesh) => {
            if (mesh.userData.originalMaterial) {
              mesh.material = mesh.userData.originalMaterial;
              delete mesh.userData.originalMaterial;
            }
          });

          // 移除边框线（LineSegments）
          wireframeMeshes.forEach((mesh) => {
            if (mesh.isLineSegments) {
              scene.remove(mesh);
            }
          });
          wireframeMeshes = [];

          // 显示原始构件
          gltfPlugin.unhideByOids([currentOid]);

          // 清理 collector
          if (currentCollector) {
            currentCollector.dispose();
          }

          currentOid = null;
          currentCollector = null;
        }

        // 创建线框效果（填充面 + 边框线）
        function createWireframeMesh(mesh) {
          const meshes = [];

          // 直接使用原 mesh，只修改材质，并添加到 scene
          if (!mesh.userData.originalMaterial) {
            mesh.userData.originalMaterial = mesh.material;
          }
          mesh.material = fillMaterial;
          scene.add(mesh);
          meshes.push(mesh);

          // 创建边框线
          const edges = new EdgesGeometry(mesh.geometry, 15);
          const line = new LineSegments(edges, edgeMaterial);
          line.matrix.copy(mesh.matrixWorld);
          line.matrixAutoUpdate = false;
          scene.add(line);
          meshes.push(line);

          return meshes;
        }

        // 设置构件为线框模式
        function setWireframe(oid) {
          // 如果点击的是当前已线框显示的构件，不做任何操作
          if (currentOid === oid) return;

          // 清除之前的线框
          clearWireframe();

          // 隐藏原始构件
          gltfPlugin.hideByOids([oid]);

          // 获取 mesh collector
          currentOid = oid;
          currentCollector = gltfPlugin.getMeshCollectorByOid(oid);

          // 创建线框 mesh
          currentCollector.meshes.forEach((mesh) => {
            const meshes = createWireframeMesh(mesh);
            wireframeMeshes.push(...meshes);
          });

          // 监听 mesh 变化事件
          currentCollector.addEventListener("mesh-change", () => {
            // 移除旧线框
            wireframeMeshes.forEach((mesh) => scene.remove(mesh));
            wireframeMeshes = [];

            // 创建新线框
            currentCollector.meshes.forEach((mesh) => {
              const meshes = createWireframeMesh(mesh);
              wireframeMeshes.push(...meshes);
            });
          });
        }

        window.addEventListener("click", (event) => {
          mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
          mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

          raycaster.setFromCamera(mouse, camera);
          const intersects = raycaster.intersectObject(
            tilesRenderer.group,
            true,
          );

          if (intersects.length > 0) {
            const featureInfo = gltfPlugin.queryFeatureFromIntersection(
              intersects[0],
            );
            if (featureInfo.isValid && featureInfo.oid !== undefined) {
              setWireframe(featureInfo.oid);
            }
          }
        });
      }

      async function main() {
        const container = document.getElementById("container");
        const { scene, camera, renderer, controls } = initScene(container);

        const tilesRenderer = new TilesRenderer(`${baseUrl}/tileset.json`);
        tilesRenderer.setCamera(camera);
        tilesRenderer.group.rotation.x = -Math.PI / 2;

        const gltfPlugin = new GLTFParserPlugin({
          renderer,
          metadata: true,
        });
        tilesRenderer.registerPlugin(gltfPlugin);
        scene.add(tilesRenderer.group);

        setupWireframe(tilesRenderer, gltfPlugin, scene, camera);

        function animate() {
          requestAnimationFrame(animate);
          controls.update();
          camera.updateMatrixWorld();
          tilesRenderer.update();
          renderer.render(scene, camera);
        }

        animate();
      }

      main();
    </script>
  </body>
</html>
